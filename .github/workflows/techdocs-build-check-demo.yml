name: TechDocs Build Check (demo)

# Demonstrates the reusable techdocs-build-check.yml workflow. Currently only the portal's own
# docs live in this repo; add another job here (with a different working-directory) as soon as
# there's a second real doc set to validate against.

on:
  pull_request:
    branches: [main]
    paths:
      - 'backstage/mkdocs.yml'
      - 'backstage/docs/**'

jobs:
  portal-docs:
    uses: ./.github/workflows/techdocs-build-check.yml
    with:
      working-directory: backstage
