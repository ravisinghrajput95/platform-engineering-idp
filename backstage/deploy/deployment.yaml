apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
    backstage.io/kubernetes-id: backstage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
        backstage.io/kubernetes-id: backstage
    spec:
      serviceAccountName: backstage
      securityContext:
        runAsNonRoot: true
      # Soft anti-affinity: prefer spreading replicas across nodes so a single node
      # loss doesn't take the whole Service down. Preferred (not required) so a busy
      # cluster can still schedule both pods if it has to.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backstage
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backstage
          image: us-central1-docker.pkg.dev/project-0c628a24-2e5e-4878-861/backstage/backstage:b8fcc53df0fb95e8f76e0a945d8c28872644fb98
          ports:
            - name: http
              containerPort: 7007
          envFrom:
            - secretRef:
                name: backstage-secrets
            - secretRef:
                name: backstage-argocd-token
          env:
            - name: POSTGRES_HOST
              value: "127.0.0.1"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "postgres"
            # Combined bundle (our own cert + the in-cluster ArgoCD server's
            # self-signed cert) -- ArgoCD's Roadie plugin calls out to
            # argocd-server.argocd.svc.cluster.local over HTTPS, which Node
            # wouldn't otherwise trust any more than it trusted our own cert.
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/backstage/ca/ca-bundle.crt
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: tls
              mountPath: /etc/backstage/tls
              readOnly: true
            - name: ca-bundle
              mountPath: /etc/backstage/ca
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 15

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.0
          args:
            - "--structured-logs"
            - "--address=127.0.0.1"
            - "--port=5432"
            - "--private-ip"
            - "project-0c628a24-2e5e-4878-861:us-central1:cloudcart-internal-developer-portal"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: tls
          secret:
            secretName: backstage-tls
        - name: ca-bundle
          secret:
            secretName: backstage-ca-bundle
