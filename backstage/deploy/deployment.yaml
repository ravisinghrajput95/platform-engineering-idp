apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      securityContext:
        runAsNonRoot: true
      containers:
        - name: backstage
          image: us-central1-docker.pkg.dev/project-0c628a24-2e5e-4878-861/backstage/backstage:e6f1af963e214d75ed8adb83a504789358cabb1c
          ports:
            - name: http
              containerPort: 7007
          envFrom:
            - secretRef:
                name: backstage-secrets
          env:
            - name: POSTGRES_HOST
              value: "127.0.0.1"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "postgres"
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/backstage/tls/tls.crt
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: tls
              mountPath: /etc/backstage/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 15

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.0
          args:
            - "--structured-logs"
            - "--address=127.0.0.1"
            - "--port=5432"
            - "--private-ip"
            - "project-0c628a24-2e5e-4878-861:us-central1:cloudcart-internal-developer-portal"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: tls
          secret:
            secretName: backstage-tls
