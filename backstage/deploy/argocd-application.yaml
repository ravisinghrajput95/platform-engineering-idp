apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ravisinghrajput95/platform-engineering-idp.git
    # NOTE: track main once this branch is merged; kept on the feature branch
    # for now so ArgoCD can sync while this is still being built out.
    targetRevision: feature/platform-branding
    path: backstage/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
