# Read-only RBAC for Backstage's own Kubernetes plugin (@backstage/plugin-kubernetes-backend)
# to display live pod/deployment status on catalog component pages. Binds the built-in `view`
# ClusterRole to the same GCP service account (backstage-sql-client, via Workload Identity)
# already used for the Cloud SQL Auth Proxy -- see app-config.production.yaml's
# kubernetes.clusterLocatorMethods (authProvider: google) and
# https://cloud.google.com/kubernetes-engine/docs/how-to/iam for how GKE maps an
# authenticated GCP identity's OAuth token to a Kubernetes `User`.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-plugin-view
subjects:
  - kind: User
    name: backstage-sql-client@project-0c628a24-2e5e-4878-861.iam.gserviceaccount.com
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
