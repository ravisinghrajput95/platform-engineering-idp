app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: https://34.55.255.110

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: https://34.55.255.110
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: ':7007'

  # No domain yet, so no CA-issued cert is possible -- browsers require a
  # secure context (HTTPS or localhost) to expose crypto.randomUUID/
  # crypto.subtle, which the frontend uses unconditionally. Visitors will
  # see a one-time untrusted-cert warning to click through. Swap for a real
  # cert once a domain is in place.
  #
  # Using our own persistent cert (mounted from the backstage-tls secret)
  # rather than Backstage's `https: true` auto-generated one: that one is
  # regenerated fresh in-memory on every restart and isn't in Node's
  # trusted CA list, which breaks the backend's own internal calls to
  # itself (e.g. the auth sign-in resolver's catalog lookup) with
  # "self-signed certificate". NODE_EXTRA_CA_CERTS (set on the container)
  # tells Node to trust this specific cert for its own outbound calls,
  # without disabling TLS validation process-wide.
  https:
    certificate:
      cert:
        $file: /etc/backstage/tls/tls.crt
      key:
        $file: /etc/backstage/tls/tls.key

  # Kept disabled even though we're on HTTPS now: with a self-signed cert,
  # if TLS ever breaks visitors would be hard-locked out for the HSTS
  # max-age. Revisit once a CA-issued cert is in place.
  csp:
    upgrade-insecure-requests: false

  # By default the catalog's UrlReader only fetches from configured integration hosts
  # (github.com, via integrations.github) or an explicit allowlist -- raw.githubusercontent.com
  # is deliberately not the same host as github.com, so the cloudcart-backend-api entity's
  # definition.$text needs it listed here explicitly. See docs/catalog.md for why that host
  # was chosen over a github.com blob URL (avoids depending on GITHUB_TOKEN's validity).
  reading:
    allow:
      - host: raw.githubusercontent.com

  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    # Puts every plugin's tables in its own schema within a single database,
    # instead of Backstage auto-creating a separate database per plugin
    # (which would require CREATEDB on the Cloud SQL user).
    pluginDivisionMode: schema
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: postgres
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt

auth:
  # Kept on "development" even though this runs on GKE: Backstage marks
  # session cookies `secure` when this is "production", which requires
  # HTTPS. We're exposed on a plain HTTP public IP for now (no domain/TLS
  # yet), so GitHub OAuth sign-in would break under "production". Flip
  # this once a domain + cert-manager/Google-managed cert is in place.
  environment: development

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - url: https://35.253.63.207
          name: cloudcart-dev
          # Not 'google' -- that's the end-user OAuth strategy and needs a `google` sign-in
          # provider under `auth.providers` (we only have GitHub), which is why it 404'd with
          # "Unknown auth provider 'google'". This one authenticates server-side via
          # Application Default Credentials (Workload Identity), same as everything else here.
          authProvider: 'googleServiceAccount'
          skipMetricsLookup: true
          # Cluster CA cert, public data (not a secret) -- from
          # `gcloud container clusters describe cloudcart-dev --region us-central1`.
          caData: 

techdocs:
  generator:
    # No Docker socket available in this pod, so generation happens in-process using the
    # mkdocs-techdocs-core install baked into the backend image (see packages/backend/Dockerfile).
    runIn: 'local'
  publisher:
    type: 'local'

catalog:
  # Overrides the default list locations from app-config.yaml as these contain example data.
  # See https://backstage.io/docs/features/software-catalog/#adding-components-to-the-catalog for more details
  # on how to get entities into the catalog.
  locations:
    # File locations are relative to the backend process; in this Docker image
    # that's /app, since the Dockerfile COPYs catalog/ and templates/ there.
    - type: file
      target: ./catalog-info.yaml

    - type: file
      target: ./catalog/groups/platform-team.yaml
      rules:
        - allow: [User, Group]

    - type: file
      target: ./catalog/systems/cloudcart-platform.yaml

    - type: file
      target: ./catalog/components/cloudcart-backend.yaml

    - type: file
      target: ./catalog/components/cloudcart-frontend.yaml

    - type: file
      target: ./catalog/resources/postgres.yaml

    - type: file
      target: ./catalog/apis/cloudcart-backend-api.yaml

    - type: file
      target: ./templates/cloudcart-fastapi/template.yaml
      rules:
        - allow: [Template]
