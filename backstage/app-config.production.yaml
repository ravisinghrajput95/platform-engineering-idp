app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: https://34.55.255.110

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: https://34.55.255.110
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: ':7007'

  # No domain yet, so no CA-issued cert is possible. `https: true` makes
  # Backstage generate a self-signed cert in-process for the baseUrl's
  # hostname -- browsers require a secure context (HTTPS or localhost) to
  # expose crypto.randomUUID/crypto.subtle, which the frontend uses
  # unconditionally. Visitors will see a one-time untrusted-cert warning
  # to click through. Swap for a real cert once a domain is in place.
  https: true

  # Kept disabled even though we're on HTTPS now: with a self-signed cert,
  # if TLS ever breaks visitors would be hard-locked out for the HSTS
  # max-age. Revisit once a CA-issued cert is in place.
  csp:
    upgrade-insecure-requests: false

  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    # Puts every plugin's tables in its own schema within a single database,
    # instead of Backstage auto-creating a separate database per plugin
    # (which would require CREATEDB on the Cloud SQL user).
    pluginDivisionMode: schema
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: postgres
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt

auth:
  # Kept on "development" even though this runs on GKE: Backstage marks
  # session cookies `secure` when this is "production", which requires
  # HTTPS. We're exposed on a plain HTTP public IP for now (no domain/TLS
  # yet), so GitHub OAuth sign-in would break under "production". Flip
  # this once a domain + cert-manager/Google-managed cert is in place.
  environment: development

catalog:
  # Overrides the default list locations from app-config.yaml as these contain example data.
  # See https://backstage.io/docs/features/software-catalog/#adding-components-to-the-catalog for more details
  # on how to get entities into the catalog.
  locations:
    # File locations are relative to the backend process; in this Docker image
    # that's /app, since the Dockerfile COPYs catalog/ and templates/ there.
    - type: file
      target: ./catalog/groups/platform-team.yaml
      rules:
        - allow: [User, Group]

    - type: file
      target: ./catalog/systems/cloudcart-platform.yaml

    - type: file
      target: ./catalog/components/cloudcart-backend.yaml

    - type: file
      target: ./catalog/components/cloudcart-frontend.yaml

    - type: file
      target: ./catalog/resources/postgres.yaml

    - type: file
      target: ./templates/cloudcart-fastapi/template.yaml
      rules:
        - allow: [Template]
