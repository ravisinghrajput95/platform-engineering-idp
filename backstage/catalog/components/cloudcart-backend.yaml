apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cloudcart-backend
  title: CloudCart Backend
  description: Backend microservice for the CloudCart platform
  tags:
    - python
    - fastapi
    - kubernetes
    - gke
  annotations:
    # Actual source lives in the AI-Powered-DevSecOps-CI-CD-Pipeline monorepo (backend/
    # subdirectory), not a standalone cloudcart-backend repo. The GitHub Actions plugin has no
    # per-path/workflow filtering, so this component's tab will show all of that repo's
    # workflow runs (backend-ci, deploy-backend, frontend-ci, codeql, etc.) -- use the tab's
    # own search/filter to narrow to backend-ci.yaml / deploy-backend.yaml.
    github.com/project-slug: ravisinghrajput95/AI-Powered-DevSecOps-CI-CD-Pipeline
    # Matches the existing `app: cloudcart-backend` label on the live Deployment/Pod in the
    # `cloudcart` namespace -- that workload isn't managed by this repo's ArgoCD Application,
    # so this reads its existing labels rather than adding a new backstage.io/kubernetes-id
    # label to resources we don't own the source of.
    backstage.io/kubernetes-label-selector: 'app=cloudcart-backend'
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: cloudcart-platform
  dependsOn:
  - resource:default/cloudcart-postgres
  providesApis:
    - cloudcart-backend-api
