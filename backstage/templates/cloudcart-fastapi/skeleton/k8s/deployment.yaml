apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.serviceName }}
  labels:
    app: ${{ values.serviceName }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ${{ values.serviceName }}
  template:
    metadata:
      labels:
        app: ${{ values.serviceName }}
    spec:
      containers:
        - name: ${{ values.serviceName }}
          image: ghcr.io/${{ values.destination.owner }}/${{ values.serviceName }}:latest
          ports:
            - containerPort: ${{ values.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: ${{ values.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: ${{ values.port }}
